<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚡ Combinada Pro MX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #060d1a 0%, #0a0f1e 60%, #0b1520 100%);
      color: #e2e8f0; font-family: Georgia, serif;
      height: 100dvh; display: flex; flex-direction: column;
      max-width: 760px; margin: 0 auto;
    }
    #header { padding: 14px 20px; background: #060d1a; border-bottom: 2px solid #a3e635; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    #header h1 { font-size: 20px; color: #a3e635; letter-spacing: 0.05em; }
    #header small { font-size: 10px; color: #475569; letter-spacing: 0.1em; display: block; margin-top: 2px; }
    #btn-nuevo { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 5px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: Georgia, serif; }
    #config-section { background: #07111f; border-bottom: 1px solid #1e293b; padding: 10px 16px; flex-shrink: 0; }
    #config-section label { font-size: 11px; color: #64748b; display: block; margin-bottom: 4px; letter-spacing: 0.05em; }
    #config-row { display: flex; gap: 8px; align-items: center; }
    #proxy-url { flex: 1; background: #0b1829; border: 1px solid #1e3a5f; border-radius: 8px; color: #7dd3fc; padding: 7px 12px; font-size: 12px; font-family: monospace; outline: none; }
    #btn-guardar { background: #0d3320; border: 1px solid #a3e635; color: #a3e635; padding: 7px 14px; border-radius: 8px; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: Georgia, serif; }
    #config-status { font-size: 10px; margin-top: 4px; color: #64748b; }
    #pills { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; flex-shrink: 0; background: #07111f; border-bottom: 1px solid #1e293b; scrollbar-width: none; }
    #pills::-webkit-scrollbar { display: none; }
    .pill { background: #0d1f35; border: 1px solid #1e3a5f; color: #7dd3fc; padding: 5px 13px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: Georgia, serif; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    #welcome { text-align: center; color: #475569; margin-top: 40px; font-size: 14px; line-height: 1.8; font-style: italic; }
    .msg-user { display: flex; justify-content: flex-end; }
    .msg-ai { display: flex; justify-content: flex-start; }
    .bubble-user { max-width: 86%; padding: 12px 16px; border-radius: 16px 16px 4px 16px; background: linear-gradient(135deg, #064e3b, #065f46); color: #dcfce7; font-size: 14px; line-height: 1.6; }
    .bubble-ai { max-width: 86%; padding: 12px 16px; border-radius: 4px 16px 16px 16px; background: #0d1f35; border: 1px solid #1e3a5f; border-left: 3px solid #a3e635; font-size: 14px; line-height: 1.6; }
    .loading-bubble { color: #a3e635; font-size: 13px; font-style: italic; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .line-combinada { color: #a3e635; font-weight: 700; font-size: 15px; }
    .line-pierna { color: #7dd3fc; font-weight: 600; }
    .line-cuota { color: #fcd34d; font-weight: 600; }
    .line-confianza { color: #86efac; font-weight: 600; }
    .line-stake { color: #c4b5fd; font-weight: 600; }
    .line-retorno { color: #fca5a5; font-weight: 600; }
    .line-warning { color: #fb923c; }
    .line-sep { color: #334155; }
    .line-bullet { color: #cbd5e1; }
    #input-section { padding: 14px 16px; background: #07111f; border-top: 1px solid #1e293b; flex-shrink: 0; }
    #input-row { display: flex; gap: 10px; align-items: flex-end; }
    #user-input { flex: 1; background: #0b1829; border: 1px solid #1e3a5f; border-radius: 10px; color: #e2e8f0; padding: 10px 14px; font-size: 14px; resize: none; outline: none; font-family: Georgia, serif; line-height: 1.5; min-height: 44px; max-height: 120px; }
    #btn-send { background: linear-gradient(135deg, #4d7c0f, #3f6212); border: none; border-radius: 10px; color: #d9f99d; padding: 0 20px; min-height: 44px; min-width: 50px; cursor: pointer; font-size: 20px; }
    #btn-send:disabled { background: #1a2a1a; color: #4a5568; cursor: not-allowed; }
    footer { text-align: center; padding: 8px; font-size: 10px; color: #334155; background: #060d1a; letter-spacing: 0.05em; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="header">
    <div><h1>⚡ Combinada Pro</h1><small>ANÁLISIS DEPORTIVO · MX</small></div>
    <button id="btn-nuevo" onclick="nuevodia()">NUEVO DÍA</button>
  </div>
  <div id="config-section">
    <label>🔗 URL DE TU SERVIDOR PROXY</label>
    <div id="config-row">
      <input id="proxy-url" type="url" placeholder="https://tu-proxy.onrender.com" />
      <button id="btn-guardar" onclick="guardarProxy()">Guardar</button>
    </div>
    <div id="config-status">Ingresa la URL de tu proxy para activar el análisis.</div>
  </div>
  <div id="pills">
    <button class="pill" onclick="enviar('Analiza los partidos de NBA de hoy: ')">🏀 NBA hoy</button>
    <button class="pill" onclick="enviar('Analiza la jornada de Liga MX. Datos: ')">⚽ Liga MX</button>
    <button class="pill" onclick="enviar('Partidos de fútbol americano: ')">🏈 NFL/NCAA</button>
    <button class="pill" onclick="enviar('Tengo una baja confirmada: ')">🏥 Baja</button>
    <button class="pill" onclick="enviar('Aquí las cuotas de hoy: ')">💰 Cuotas</button>
    <button class="pill" onclick="enviar('Genera una combinada alternativa con los mismos datos.')">🔁 Alternativa</button>
  </div>
  <div id="chat">
    <div id="welcome">¡Listo para analizar! 🎯<br><br>Guarda la URL de tu proxy arriba.<br>Luego dime partidos, bajas y cuotas.</div>
  </div>
  <div id="input-section">
    <div id="input-row">
      <textarea id="user-input" rows="2" placeholder="Escribe partidos, bajas, cuotas... (Enter para enviar)" onkeydown="handleKey(event)"></textarea>
      <button id="btn-send" onclick="enviar()" disabled>➤</button>
    </div>
  </div>
  <footer>DRAFTEA · PLAYDOIT · TEAM MÉXICO &nbsp;|&nbsp; ⚠️ JUEGA RESPONSABLEMENTE</footer>
<script>
const SYSTEM_PROMPT = `Eres un analista experto en apuestas deportivas combinadas para México. Tu trabajo es construir combinadas de 2-3 piernas con cuota final entre 2.10 y 5.10, usando ÚNICAMENTE los datos que el usuario te proporciona. NUNCA inventes partidos, cuotas, jugadores ni resultados.

REGLAS: Mínimo 2 piernas, máximo 3. Cuota final entre 2.10 y 5.10. Cuota mínima por pierna 1.40. No combinar el mismo equipo en dos piernas. Evitar jugadores GTD sin confirmar.

CASAS MX: Draftea, Playdoit, Team México.

FORMATO OBLIGATORIO:
🎯 COMBINADA RECOMENDADA

PIERNA 1: [Partido]
• Selección: [qué apostamos]
• Cuota: [X.XX]
• Motivo: [razón en 1-2 líneas]
• Riesgo: [factor principal]

PIERNA 2: [mismo formato]
PIERNA 3 (si aplica): [mismo formato]

━━━━━━━━━━━━━━━━━━━━
💰 CUOTA TOTAL: X.XX
📊 CONFIANZA: Alta / Media / Baja
💵 STAKE SUGERIDO: X% del bankroll
🏆 RETORNO por $100 MXN: $XXX MXN
━━━━━━━━━━━━━━━━━━━━

REGLA CRÍTICA: Si no tienes datos suficientes, pide más información. NUNCA inventes partidos ni cuotas.`;

let messages = [];
let proxyUrl = localStorage.getItem("combinada_proxy") || "";
let isLoading = false;

window.onload = () => {
  document.getElementById("proxy-url").value = proxyUrl;
  if (proxyUrl) {
    document.getElementById("config-status").textContent = "✅ Proxy configurado: " + proxyUrl;
    document.getElementById("btn-send").disabled = false;
  }
};

function guardarProxy() {
  const val = document.getElementById("proxy-url").value.trim().replace(/\/$/, "");
  if (!val) return alert("Ingresa una URL válida");
  proxyUrl = val;
  localStorage.setItem("combinada_proxy", val);
  document.getElementById("config-status").textContent = "✅ Guardado: " + val;
  document.getElementById("btn-send").disabled = false;
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); }
}

async function enviar(customText = null) {
  if (isLoading) return;
  const textarea = document.getElementById("user-input");
  const text = (customText || textarea.value).trim();
  if (!text) return;
  if (!proxyUrl) { alert("Primero guarda la URL de tu proxy."); return; }

  messages.push({ role: "user", content: text });
  textarea.value = "";
  agregarBurbuja("user", text);
  isLoading = true;
  document.getElementById("btn-send").disabled = true;
  const loadingEl = agregarLoading();

  try {
    const res = await fetch(proxyUrl + "/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages,
      }),
    });
    const data = await res.json();
    const reply = data.content?.map(b => b.text || "").join("\n") || "❌ Sin respuesta.";
    messages.push({ role: "assistant", content: reply });
    loadingEl.remove();
    agregarBurbuja("ai", reply);
  } catch (e) {
    loadingEl.remove();
    agregarBurbuja("ai", "❌ No se pudo conectar al proxy. Verifica que tu servidor esté corriendo.");
    messages.push({ role: "assistant", content: "❌ Error." });
  } finally {
    isLoading = false;
    document.getElementById("btn-send").disabled = false;
  }
}

function agregarBurbuja(tipo, texto) {
  const chat = document.getElementById("chat");
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();
  const wrapper = document.createElement("div");
  wrapper.className = tipo === "user" ? "msg-user" : "msg-ai";
  const bubble = document.createElement("div");
  bubble.className = tipo === "user" ? "bubble-user" : "bubble-ai";
  if (tipo === "user") {
    bubble.textContent = texto;
  } else {
    texto.split("\n").forEach(line => {
      const span = document.createElement("span");
      span.style.display = "block";
      span.textContent = line || "\u00A0";
      if (line.startsWith("🎯")) span.className = "line-combinada";
      else if (line.startsWith("PIERNA")) span.className = "line-pierna";
      else if (line.startsWith("💰")) span.className = "line-cuota";
      else if (line.startsWith("📊")) span.className = "line-confianza";
      else if (line.startsWith("💵")) span.className = "line-stake";
      else if (line.startsWith("🏆")) span.className = "line-retorno";
      else if (line.startsWith("⚠️")) span.className = "line-warning";
      else if (line.startsWith("━")) span.className = "line-sep";
      else if (line.startsWith("•")) span.className = "line-bullet";
      bubble.appendChild(span);
    });
  }
  wrapper.appendChild(bubble);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

function agregarLoading() {
  const chat = document.getElementById("chat");
  const wrapper = document.createElement("div");
  wrapper.className = "msg-ai";
  const bubble = document.createElement("div");
  bubble.className = "bubble-ai";
  bubble.innerHTML = '<span class="loading-bubble">Analizando mercado...</span>';
  wrapper.appendChild(bubble);
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
  return wrapper;
}

function nuevodia() {
  messages = [];
  document.getElementById("chat").innerHTML = '<div id="welcome" style="text-align:center;color:#475569;margin-top:40px;font-size:14px;line-height:1.8;font-style:italic;">¡Nuevo día! 🎯<br>Dime los partidos, bajas y cuotas de hoy.</div>';
}
</script>
</body>
</html>
